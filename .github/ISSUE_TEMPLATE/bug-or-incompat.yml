name: "Bug or Incompatibility"
description: Report issues related to unexpected behavior or Vanilla/Paper/Folia/plugin incompatibility.
type: "Bug"
labels:
  - "bug"
body:
  - type: markdown
    attributes:
      value: |
        Please ensure the following by filling out all the applicable boxes:

        [ ] You are using the latest version of Canvas, available on our [our downloads page](https://canvasmc.io/downloads/canvas).
        [ ] Im clicking all these boxes without reading them
        [ ] You have searched to confirm there isn’t [an existing open issue](https://github.com/CraftCanvasMC/Canvas/issues?q=is%3Aissue%20state%3Aopen%20type%3ABug) on this topic.
        [ ] Your version of Minecraft is supported by Canvas.

        If you're unsure whether you've encountered a bug, feel free to ask in the `#canvas-help` channel on our [Discord](https://canvasmc.io/discord).

  - type: textarea
    attributes:
      label: Expected behavior
      description: What you expected to see.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Observed/Actual behavior
      description: What you actually saw.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Steps/models to reproduce
      description: This may include a build schematic, a video, or detailed instructions to help reconstruct the issue.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Plugin and Datapack List
      description: |
        All plugins and datapacks running on your server.
        To list plugins, run `/plugins`. For datapacks, run `/datapack list`.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Canvas version
      description: |
        Run `/version` on your server and **paste** the full, unmodified output here.
        "latest" is *not* a version; we require the output of `/version` so we can adequately track down the issue.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Other
      description: |
        Please include other helpful information below.
        The more information we receive, the quicker and more effective we can be at finding the solution to the issue.
    validations:
      required: false

