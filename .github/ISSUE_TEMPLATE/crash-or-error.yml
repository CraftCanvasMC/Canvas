name: "Crash or Stacktrace"
description: Report any server crashes or alarming stack traces.
type: "Bug"
labels:
  - "bug"
  - "error"
body:
  - type: markdown
    attributes:
      value: |
        Please ensure the following by filling out all the applicable boxes:

        [ ] You are using the latest version of Canvas, available on our [our downloads page](https://canvasmc.io/downloads/canvas).
        [ ] Im clicking all these boxes without reading them
        [ ] You have searched to confirm there isn’t [an existing open issue](https://github.com/CraftCanvasMC/Canvas/issues?q=is%3Aissue%20state%3Aopen%20type%3ABug) on this topic.
        [ ] Your version of Minecraft is supported by Canvas.

        If you are unsure about anything, ask in our [Discord](https://canvasmc.io/discord) in the `#canvas-help` channel

  - type: textarea
    attributes:
      label: Stack trace
      description: |
        We need all of the stack trace! Do not cut off parts of it. Please do not use attachments.
        If you prefer, you can use a paste site like https://mclo.gs.
      value: |
        ```
        paste your stack trace or a mclo.gs link here!
        ```
      placeholder: Please don't remove the backticks; it makes your issue a lot harder to read!
    validations:
      required: true

  - type: textarea
    attributes:
      label: Plugin and Datapack List
      description: |
        All plugins and datapacks running on your server.
        To list plugins, run `/plugins`. For datapacks, run `/datapack list`.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Actions to reproduce (if known)
      description: This may include a build schematic, a video, or detailed instructions to help reconstruct the issue. Anything helps!
    validations:
      required: false

  - type: textarea
    attributes:
      label: Canvas version
      description: |
        Run `/version` on your server and **paste** the full, unmodified output here.
        "latest" is *not* a version; we require the output of `/version` so we can adequately track down the issue.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Other
      description: |
        Please include other helpful information below, if any.
        The more information we receive, the quicker and more effective we can be at finding the solution to the issue.
    validations:
      required: false
